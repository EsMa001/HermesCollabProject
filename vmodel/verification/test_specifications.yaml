  validates: [StR-002]
  level: acceptance
  title: User acceptance test for Python project baseline
  description: Validate that the project baseline, examples and implementation conventions are Python-based.
  acceptance_criteria:
    - AC-StR-002-01
    - AC-StR-002-02
    - AC-StR-002-03
  expected_result: The repository baseline consistently uses Python for implementation, tests and tooling.
