- id: TC-SwR-001-001
  verifies: [SwR-001]
  level: unit
  title: Load explicit configuration path
  description: Verify that the configuration loader accepts an explicit path.
  preconditions:
    - A valid configuration artifact exists.
  steps:
    - Create a temporary configuration artifact.
    - Load it via the repository configuration logic.
  expected_result: The configuration loaded matches the provided artifact.
- id: TC-SyR-001-001
  verifies: [SyR-001]
  level: system
  title: Start run from explicit versioned configuration
  description: Verify that a run can start from an explicitly selected configuration artifact.
  preconditions:
    - A valid versioned configuration file exists.
  steps:
    - Start the run using an explicit configuration path.
  expected_result: The run starts successfully using the selected configuration artifact.
- id: TC-SyR-002-001
  verifies: [SyR-002]
  level: system
  title: Verify Python implementation stack usage
  description: Verify that the repository implementation, tests and tooling use Python as the primary stack.
  preconditions:
    - Repository baseline files exist.
  steps:
    - Inspect production code layout.
    - Inspect test layout and runner configuration.
    - Inspect repository tooling scripts.
  expected_result: Production code, tests and tooling are all defined in Python.
- id: TC-SwR-002-001
  verifies: [SwR-002]
  level: unit
  title: Verify production modules are Python files
  description: Verify that production modules are stored as Python source files in the repository code layout.
  preconditions:
    - At least one production module exists.
  steps:
    - Enumerate production modules in the code root.
    - Check file extensions and language conventions.
  expected_result: Production modules are implemented as `.py` files.
- id: TC-SwR-003-001
  verifies: [SwR-003]
  level: unit
  title: Verify automated tests are Python test modules
  description: Verify that automated tests follow Python module and pytest conventions.
  preconditions:
    - At least one automated test module exists.
  steps:
    - Enumerate test modules.
    - Check naming and Python module conventions.
  expected_result: Automated tests are implemented as Python test modules.
- id: TC-SwR-007-001
  verifies: [SwR-007]
  level: unit
  title: Persist mandatory run metadata
  description: Verify that the run metadata writer persists required fields.
  preconditions:
    - Metadata fields are available.
  steps:
    - Create metadata object.
    - Persist it.
    - Reload the artifact.
  expected_result: The artifact contains software_version, configuration_version and input_data_references.
- id: TC-SwR-008-001
  verifies: [SwR-008]
  level: integration
  title: Show metadata in run report
  description: Verify that the user-visible report exposes persisted metadata fields.
  preconditions:
    - Run metadata has been persisted.
  steps:
    - Generate run report.
    - Inspect report content.
  expected_result: The report includes all mandatory reproducibility metadata fields.
- id: TC-SyR-004-001
  verifies: [SyR-004]
  level: system
  title: Preserve reproducibility metadata across a completed run
  description: Verify that a completed run produces retained metadata needed for reproducibility.
  preconditions:
    - End-to-end run execution is available.
  steps:
    - Start a run from a versioned configuration.
    - Complete the run.
    - Inspect metadata and report artifacts.
  expected_result: Persisted artifacts include software version, configuration version and input references.
- id: TC-SyR-010-001
  verifies: [SyR-010]
  level: system
  title: Execute supported arithmetic operations
  description: Verify that the calculator returns correct results for the four supported arithmetic operations.
  preconditions:
    - The calculator application is available.
  steps:
    - Enter two operands.
    - Execute addition, subtraction, multiplication and division.
    - Inspect the displayed results.
  expected_result: Each supported operation returns the numerically correct result.
- id: TC-SyR-011-001
  verifies: [SyR-011]
  level: system
  title: Show classic calculator GUI elements
  description: Verify that the calculator GUI exposes digit buttons, operator buttons and a display.
  preconditions:
    - The calculator application is started.
  steps:
    - Inspect the visible user interface.
  expected_result: The UI contains digit buttons, operator buttons and a visible display.
- id: TC-SyR-012-001
  verifies: [SyR-012]
  level: analysis
  title: Confirm restricted first-scope feature set
  description: Verify that unsupported advanced calculator features are absent from the first-scope design and implementation scope.
  preconditions:
    - Requirements and design artifacts are available.
  steps:
    - Inspect scope statements and derived artifacts.
    - Confirm that advanced features are not included.
  expected_result: Only simple calculator operations are in scope, and excluded features are absent.
- id: TC-SyR-013-001
  verifies: [SyR-013]
  level: analysis
  title: Confirm local single-user deployment scope
  description: Verify that the calculator is defined as a local single-user application without network or multi-user behavior.
  preconditions:
    - Requirements and architecture artifacts are available.
  steps:
    - Inspect requirements and architecture statements.
  expected_result: The solution scope remains local, single-user and offline.
- id: TC-SyR-014-001
  verifies: [SyR-014]
  level: analysis
  title: Confirm Tkinter-based desktop GUI stack
  description: Verify that the calculator GUI is derived as a Tkinter desktop application on the Python baseline.
  preconditions:
    - Requirements and architecture artifacts are available.
  steps:
    - Inspect the derived system requirements and architecture decisions.
  expected_result: The desktop GUI technology is Tkinter and the implementation stack remains Python-based.
- id: TC-SyR-015-001
  verifies: [SyR-015]
  level: system
  title: Accept integer and decimal operands
  description: Verify that the calculator can process both integer and decimal operands.
  preconditions:
    - The calculator application is available.
  steps:
    - Execute calculations with integer operands.
    - Execute calculations with decimal operands.
  expected_result: Both integer and decimal operand cases are processed correctly.
- id: TC-SyR-016-001
  verifies: [SyR-016]
  level: system
  title: Reject division by zero
  description: Verify that division by zero produces a clear user-visible error instead of a numeric result.
  preconditions:
    - The calculator application is available.
  steps:
    - Enter a division by zero request.
    - Inspect the user-visible response.
  expected_result: The request is rejected and the user receives a clear error indication.
- id: TC-SyR-017-001
  verifies: [SyR-017]
  level: system
  title: Handle invalid requests predictably
  description: Verify that invalid requests are prevented where practical and otherwise produce understandable user feedback.
  preconditions:
    - The calculator application is available.
  steps:
    - Trigger representative invalid interaction cases.
    - Inspect the resulting user feedback.
  expected_result: Invalid requests do not lead to misleading results and produce understandable feedback.
- id: TC-SyR-018-001
  verifies: [SyR-018]
  level: system
  title: Provide clear and equals controls
  description: Verify that the calculator UI provides Clear and equals controls and that they can be invoked by the user.
  preconditions:
    - The calculator application is started.
  steps:
    - Inspect the UI for Clear and equals controls.
    - Invoke each control once.
  expected_result: Clear and equals controls are available and invokable.
- id: TC-SyR-019-001
  verifies: [SyR-019]
  level: system
  title: Reuse previous result for next operation
  description: Verify that a computed result can be reused directly in a subsequent calculator operation.
  preconditions:
    - The calculator application is available.
  steps:
    - Compute an initial result.
    - Continue with a second operation using the displayed result.
  expected_result: The displayed result can be reused without manual re-entry.
- id: TC-SyR-020-001
  verifies: [SyR-020]
  level: analysis
  title: Confirm requirement-to-test traceability structure
  description: Verify that project artifacts maintain explicit traceability between requirements, implementation and tests.
  preconditions:
    - Traceability artifacts are available.
  steps:
    - Inspect requirement, traceability and verification artifacts.
  expected_result: The calculator slice is represented by explicit traceability links across lifecycle artifacts.
- id: TC-SyR-021-001
  verifies: [SyR-021]
  level: analysis
  title: Confirm separation of calculation core and GUI
  description: Verify that derived artifacts require a separation between calculation logic and GUI responsibilities.
  preconditions:
    - Requirements and architecture artifacts are available.
  steps:
    - Inspect derived requirements and architecture decisions.
  expected_result: Calculation logic and GUI responsibilities are defined as separate concerns.
- id: TC-SyR-022-001
  verifies: [SyR-022]
  level: analysis
  title: Confirm automated verification scope
  description: Verify that automated verification is required for calculation logic and selected GUI behavior.
  preconditions:
    - Requirements and verification artifacts are available.
  steps:
    - Inspect derived requirements and planned test artifacts.
  expected_result: Automated verification scope includes calculation logic and selected GUI behavior.
- id: TC-SyR-023-001
  verifies: [SyR-023]
  level: system
  title: Format results without unnecessary trailing decimals
  description: Verify that displayed results are user-friendly and omit unnecessary trailing decimal places.
  preconditions:
    - The calculator application is available.
  steps:
    - Execute representative calculations with integer and decimal outputs.
    - Inspect the displayed result formatting.
  expected_result: Results remain numerically correct and omit unnecessary trailing decimal places.
- id: TC-SyR-024-001
  verifies: [SyR-024]
  level: system
  title: Present German-language UI text
  description: Verify that the calculator UI labels and relevant error messages are presented in German.
  preconditions:
    - The calculator application is started.
  steps:
    - Inspect user-facing labels.
    - Trigger a representative error case.
  expected_result: User-facing labels and relevant errors are presented in German.
- id: TC-SyR-025-001
  verifies: [SyR-025]
  level: system
  title: Start with display value zero
  description: Verify that the calculator starts with a defined display value of 0.
  preconditions:
    - The calculator application can be started.
  steps:
    - Start the application.
    - Inspect the initial display.
  expected_result: The display shows 0 after startup.
- id: TC-SwR-010-001
  verifies: [SwR-010]
  level: unit
  title: Execute arithmetic core operation
  description: Verify that the arithmetic core returns correct results for supported operators.
  preconditions:
    - The arithmetic core function is available.
  steps:
    - Invoke the arithmetic core with representative operands and each supported operator.
  expected_result: The arithmetic core returns the correct result for each supported operator.
- id: TC-SwR-011-001
  verifies: [SwR-011]
  level: integration
  title: Render calculator buttons and display
  description: Verify that the Tkinter calculator UI creates digit buttons, operator buttons and a display widget.
  preconditions:
    - The calculator UI can be instantiated.
  steps:
    - Instantiate the calculator UI.
    - Inspect the created widgets.
  expected_result: The UI contains digit buttons, operator buttons and a display widget.
- id: TC-SwR-012-001
  verifies: [SwR-012]
  level: integration
  title: Enforce simple-operation state model
  description: Verify that the calculator interaction model supports only simple sequential operations and excludes advanced expression parsing.
  preconditions:
    - The calculator UI or controller is available.
  steps:
    - Execute representative simple operations.
    - Attempt excluded advanced interaction patterns.
  expected_result: Simple sequential operations are supported and excluded advanced patterns are not executed.
- id: TC-SwR-013-001
  verifies: [SwR-013]
  level: analysis
  title: Confirm local process dependencies only
  description: Verify that the calculator software does not require network or multi-user dependencies.
  preconditions:
    - Software artifacts are available.
  steps:
    - Inspect runtime dependencies and software interfaces.
  expected_result: The software runs as a local process without network or multi-user dependencies.
- id: TC-SwR-014-001
  verifies: [SwR-014]
  level: integration
  title: Start Tkinter calculator application entry point
  description: Verify that the calculator exposes a Tkinter-based application entry point.
  preconditions:
    - The calculator application package is available.
  steps:
    - Invoke the application entry point.
    - Inspect the resulting root window and calculator UI.
  expected_result: The application entry point starts a Tkinter-based calculator UI.
- id: TC-SwR-015-001
  verifies: [SwR-015]
  level: unit
  title: Parse integer and decimal input values
  description: Verify that integer and decimal inputs are parsed and stored correctly.
  preconditions:
    - The input parsing logic is available.
  steps:
    - Parse representative integer inputs.
    - Parse representative decimal inputs.
  expected_result: Integer and decimal inputs are accepted and represented correctly.
- id: TC-SwR-016-001
  verifies: [SwR-016]
  level: unit
  title: Detect division by zero before numeric result output
  description: Verify that division-by-zero requests produce an error state instead of a numeric result.
  preconditions:
    - The arithmetic or controller logic is available.
  steps:
    - Invoke a division-by-zero request.
  expected_result: The request produces an error state and no numeric result.
- id: TC-SwR-017-001
  verifies: [SwR-017]
  level: integration
  title: Map invalid requests to understandable errors
  description: Verify that remaining invalid requests are converted into understandable error text.
  preconditions:
    - The calculator controller or UI is available.
  steps:
    - Trigger representative invalid request cases.
    - Inspect the displayed error text.
  expected_result: The user receives understandable error text for invalid requests.
- id: TC-SwR-018-001
  verifies: [SwR-018]
  level: integration
  title: Execute Clear and equals actions
  description: Verify that Clear and equals actions update the calculator state and display as intended.
  preconditions:
    - The calculator UI or controller is available.
  steps:
    - Enter a representative calculation.
    - Invoke equals.
    - Invoke Clear.
  expected_result: Equals computes and shows a result, and Clear resets the calculator state and display.
- id: TC-SwR-019-001
  verifies: [SwR-019]
  level: integration
  title: Reuse previous result from session state
  description: Verify that the last result remains available for a subsequent calculation.
  preconditions:
    - The calculator controller or UI is available.
  steps:
    - Execute a first calculation.
    - Continue with a second calculation using the retained result.
  expected_result: The retained result is reused without manual re-entry.
- id: TC-SwR-020-001
  verifies: [SwR-020]
  level: analysis
  title: Confirm software-level trace links exist
  description: Verify that calculator software artifacts maintain explicit links to requirements, planned implementation elements and tests.
  preconditions:
    - Traceability artifacts are available.
  steps:
    - Inspect software requirements, trace links and planned implementation artifacts.
  expected_result: Explicit software-level trace links are defined from requirements to planned implementation elements and tests.
- id: TC-SwR-021-001
  verifies: [SwR-021]
  level: analysis
  title: Confirm calculator core and GUI module separation
  description: Verify that derived software artifacts require separate modules for calculator core logic and GUI responsibilities.
  preconditions:
    - Software requirements and design artifacts are available.
  steps:
    - Inspect software requirements and design decisions.
  expected_result: Calculator core and GUI responsibilities are assigned to separate modules.
- id: TC-SwR-022-001
  verifies: [SwR-022]
  level: analysis
  title: Confirm automated test scope for logic and GUI
  description: Verify that the planned automated tests cover arithmetic logic and selected GUI behavior.
  preconditions:
    - Software requirements and verification artifacts are available.
  steps:
    - Inspect software requirements and test specifications.
  expected_result: Planned automated tests cover arithmetic logic and selected GUI behavior.
- id: TC-SwR-023-001
  verifies: [SwR-023]
  level: unit
  title: Format results without unnecessary trailing decimals
  description: Verify that result formatting preserves value while removing unnecessary trailing decimal places.
  preconditions:
    - The result formatting logic is available.
  steps:
    - Format representative integer-like and decimal results.
  expected_result: Results remain numerically correct and omit unnecessary trailing decimal places.
- id: TC-SwR-024-001
  verifies: [SwR-024]
  level: integration
  title: Provide German UI labels and error strings
  description: Verify that the calculator UI and relevant errors use German-language text.
  preconditions:
    - The calculator UI is available.
  steps:
    - Inspect visible labels.
    - Trigger a representative error state.
  expected_result: Labels and relevant error strings are shown in German.
- id: TC-SwR-025-001
  verifies: [SwR-025]
  level: integration
  title: Initialize display text to zero on startup
  description: Verify that the calculator display is initialized to 0 when the application starts.
  preconditions:
    - The calculator UI can be started.
  steps:
    - Start the calculator application.
    - Inspect the display text.
  expected_result: The display text is initialized to 0.
- id: ATC-StR-001-001
  validates: [StR-001]
  level: acceptance
  title: User acceptance test for reproducible run
  description: Validate that the user can execute a run and inspect all metadata required for reproducibility.
  acceptance_criteria:
    - AC-StR-001-01
    - AC-StR-001-02
    - AC-StR-001-03
    - AC-StR-001-04
    - AC-StR-001-05
  expected_result: The run report and output folder contain sufficient metadata to reproduce and audit the run.
