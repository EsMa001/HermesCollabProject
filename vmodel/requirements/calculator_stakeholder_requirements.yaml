- id: StR-001
  version: 1
  title: Grundzweck
  statement: >
    Der Taschenrechner soll als lokales Demo-Projekt dienen, das sowohl die
    korrekte Ausführung einfacher Rechenoperationen als auch einen
    nachvollziehbaren Entwicklungsworkflow demonstriert.
  rationale: >
    Das Mini-Projekt soll funktionalen Nutzen mit einem nachvollziehbaren
    Requirements-, Test- und Traceability-Demonstrator verbinden.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  notes:
    - Primärer Stakeholder: Max
    - Zieldoppel: funktional korrekter Taschenrechner und Demonstrator für Workflow mit Requirements, Tests und Traceability.
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung für das Taschenrechner-Mini-Projekt übernommen.
- id: StR-002
  version: 1
  title: Grundrechenarten
  statement: >
    Der Taschenrechner soll die vier Grundrechenarten Addition, Subtraktion,
    Multiplikation und Division unterstützen.
  rationale: >
    Die Grundrechenarten definieren den funktionalen Kern des ersten Scopes.
  priority: must
  status: accepted
  owner: Max
  acceptance_criteria:
    - id: AC-StR-002-01
      statement: Addition ist unterstützt.
    - id: AC-StR-002-02
      statement: Subtraktion ist unterstützt.
    - id: AC-StR-002-03
      statement: Multiplikation ist unterstützt.
    - id: AC-StR-002-04
      statement: Division ist unterstützt.
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-003
  version: 1
  title: Benutzeroberfläche
  statement: >
    Der Taschenrechner soll eine klassische grafische Taschenrechner-
    Benutzeroberfläche mit Zahlentasten, Operator-Tasten und einer
    Ergebnisanzeige bereitstellen.
  rationale: >
    Eine klassische GUI macht das Beispiel unmittelbar benutzbar und gut als
    Demo nachvollziehbar.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-004
  version: 1
  title: Bedienkonzept
  statement: >
    Der Taschenrechner soll im ersten Scope nur einfache Operationen
    unterstützen, nicht jedoch komplexe mathematische Ausdrücke.
  rationale: >
    Der erste Scope soll klein, klar und gut testbar bleiben.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-005
  version: 1
  title: Lokale Einzelbenutzung
  statement: >
    Der Taschenrechner soll als lokale Einzelbenutzer-Anwendung ohne Netzwerk-
    oder Mehrbenutzerfunktionalität bereitgestellt werden.
  rationale: >
    Für das Mini-Projekt wird keine verteilte oder mehrbenutzerfähige
    Architektur benötigt.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-006
  version: 1
  title: Plattformkonzept
  statement: >
    Der Taschenrechner soll im ersten Scope als lokale Desktop-Anwendung auf
    Basis von Python und Tkinter umgesetzt werden.
  rationale: >
    Python und Tkinter halten das Beispiel lokal, einfach und ohne zusätzliche
    GUI-Abhängigkeiten umsetzbar.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-007
  version: 1
  title: Unterstützte Zahlentypen
  statement: >
    Der Taschenrechner soll im ersten Scope sowohl ganze Zahlen als auch
    Dezimalzahlen verarbeiten können.
  rationale: >
    Das Beispiel soll realistisch genug für typische Grundrechenfälle sein.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-008
  version: 1
  title: Division durch Null
  statement: >
    Der Taschenrechner soll bei Division durch 0 einen klaren Fehler erzeugen
    und diesen für den Benutzer verständlich behandeln.
  rationale: >
    Division durch Null ist ein zentraler Fehlerfall des ersten Scopes.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-009
  version: 1
  title: Fehlerbehandlung
  statement: >
    Der Taschenrechner soll fehlerhafte Eingaben soweit wie sinnvoll verhindern
    und verbleibende Fehler verständlich anzeigen.
  rationale: >
    Vorhersehbares Fehlerverhalten verbessert Verständlichkeit und Robustheit
    des Demonstrators.
  priority: should
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-010
  version: 1
  title: Zusätzliche Bedienelemente
  statement: >
    Der Taschenrechner soll im ersten Scope mindestens die Funktionen Clear (C)
    und Ergebnisberechnung (=) bereitstellen.
  rationale: >
    Diese Bedienelemente sind für einen brauchbaren Taschenrechner-Grundablauf
    erforderlich.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-011
  version: 1
  title: Weiterverwendung des Ergebnisses
  statement: >
    Der Taschenrechner soll es ermöglichen, ein berechnetes Ergebnis direkt als
    Ausgangspunkt für eine nachfolgende Operation weiterzuverwenden.
  rationale: >
    Dies bildet ein natürliches Bedienverhalten klassischer Taschenrechner ab.
  priority: should
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-012
  version: 1
  title: Nachvollziehbarkeit
  statement: >
    Das Projekt soll so aufgebaut sein, dass Anforderungen, Implementierung und
    Tests im ersten Scope nachvollziehbar miteinander verknüpft werden können.
  rationale: >
    Das Projekt dient ausdrücklich auch als Traceability- und Workflow-
    Demonstrator.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-013
  version: 1
  title: Strukturierung
  statement: >
    Das Projekt soll im ersten Scope sauber strukturiert umgesetzt werden,
    sodass Rechenlogik und Benutzeroberfläche getrennt betrachtet und
    weiterentwickelt werden können.
  rationale: >
    Die Trennung von GUI und Rechenkern erhöht Änderbarkeit und Testbarkeit.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-014
  version: 1
  title: Testbarkeit
  statement: >
    Das Projekt soll automatisierte Tests für die Rechenlogik und ausgewählte
    Teile der Benutzeroberfläche enthalten.
  rationale: >
    Automatisierte Tests sind für den Demonstrator und den Workflow-Nachweis
    erforderlich.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-015
  version: 1
  title: Benutzerorientierte Darstellung
  statement: >
    Der Taschenrechner soll Ergebnisse benutzerfreundlich darstellen,
    insbesondere ohne unnötige Nachkommastellen.
  rationale: >
    Die Ergebnisdarstellung soll menschlich plausibel und gut lesbar sein.
  priority: should
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-016
  version: 1
  title: Sprache
  statement: >
    Die Benutzeroberfläche und relevante Fehlermeldungen sollen im ersten Scope
    deutschsprachig ausgeführt sein.
  rationale: >
    Eine deutschsprachige GUI passt zum vorgesehenen Demonstrationskontext.
  priority: should
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-017
  version: 1
  title: Startzustand
  statement: >
    Der Taschenrechner soll nach dem Start einen definierten Anfangszustand
    besitzen, bei dem das Display den Wert 0 anzeigt.
  rationale: >
    Ein definierter Startzustand verbessert Bedienbarkeit und Testbarkeit.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
- id: StR-018
  version: 1
  title: Ausgeschlossene Funktionen
  statement: >
    Der Taschenrechner soll im ersten Scope keine komplexen Ausdrücke mit
    Operatorpriorität, keine Klammern, keine wissenschaftlichen Funktionen,
    keine Speicherfunktionen, keine Verlaufshistorie, keine Tastaturbedienung,
    kein Copy/Paste und kein Undo/Redo unterstützen.
  rationale: >
    Die explizite Scope-Begrenzung schützt das Mini-Projekt vor unnötiger
    Komplexität im ersten Inkrement.
  priority: must
  status: accepted
  owner: Max
  assumptions: []
  open_questions: []
  scope_exclusions:
    - komplexe Ausdrücke mit Operatorpriorität
    - Klammern
    - wissenschaftliche Funktionen
    - Speicherfunktionen
    - Verlauf / History
    - Tastaturbedienung
    - Copy/Paste
    - Undo / Redo
  change_history:
    - version: 1
      date: 2026-05-07
      reason: Aus bestehender Chat-Ausarbeitung übernommen.
